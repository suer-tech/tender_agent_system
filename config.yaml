keywords:
  - искусственный интеллект
  - машинное обучение
  - нейросет
  - чат-бот
  - автоматизация процессов
  - компьютерное зрение
  - распознавание речи
  - обработка естественного языка
  - большие языковые модели
  - RPA

search:
  max_results_per_keyword: 20
  law_types: ["44", "223"]

llm:
  relevance_threshold: 7
  model_timeout_sec: 120

# Глубокий поиск через Bicotender
bicotender:
  # Ключевые слова (если не указать — берутся из keywords выше)
  keywords:
    - искусственный интеллект
    - машинное обучение
    - нейросет
    - чат-бот
    - автоматизация процессов
  max_results: 5              # тендеров на одно ключевое слово
  max_docs_per_tender: 3      # документов для скачивания на тендер
  analysis_timeout_sec: 180   # таймаут Claude на анализ одного тендера
